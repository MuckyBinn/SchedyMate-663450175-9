name: schedymate
description: A new Flutter project.

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  google_sign_in: ^6.2.1
  file_picker: ^8.0.0
  firebase_storage: ^12.4.10
  http: ^1.2.0
  docx_to_text: ^1.0.1
  syncfusion_flutter_pdf: ^24.1.41

  # 🔥 AI / OCR
  google_mlkit_text_recognition: ^0.14.0

  image_picker: ^1.1.2
  xml: ^6.5.0

  # 🔥 QR (สร้าง QR ได้)
  qr_flutter: ^4.1.0

  video_player: ^2.8.2
  flutter_dropzone: ^3.0.6
  url_launcher: ^6.2.6
  photo_view: ^0.14.0
  palette_generator: ^0.3.3
  webview_flutter: ^4.4.0
  camera: ^0.10.5+9
  pro_image_editor: ^5.3.0

  # 🔔 Notification
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter_native_splash:
  color: "#4D7CFE"
  image: assets/images/SchedyMateTransparent.png
  android: true
  ios: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/SchedyIcon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/SchedyMateTransparent.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
